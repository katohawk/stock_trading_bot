# 股票交易机器人配置示例
# 复制为 config.yaml 并按需修改

market: "a"  # a | us
symbols:
  - "000001"   # A 股示例：平安银行
  - "600000"   # 上海
# 美股示例:
# symbols: ["AAPL", "MSFT"]

strategy:
  name: "dual_ma"  # dual_ma | breakout | grid
  params:
    short_window: 5
    long_window: 20
# 网格策略（加密货币高抛低吸）示例:
#   name: grid
#   params:
#     grid_low: 50000
#     grid_high: 70000
#     num_grids: 10

risk:
  max_position_pct: 0.25
  max_total_position_pct: 1.0
  max_daily_trades: 20
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  daily_loss_limit_pct: 0.05
  consecutive_loss_days_limit: 3

backtest:
  initial_cash: 1000000
  commission_rate: 0.0003
  slippage_pct: 0.001

# 实盘（占位）
# broker:
#   mode: simulated  # simulated | live
#   live:
#     api_key: ${API_KEY}
#     api_secret: ${API_SECRET}
# OKX 实盘：设置环境变量 OKX_API_KEY, OKX_API_SECRET, OKX_PASSPHRASE 后运行 run_okx_live.py 或 Web 控制台

