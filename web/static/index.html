<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OKX 交易机器人</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>OKX 交易机器人</h1>
    <nav class="header-nav">
      <a href="/config" class="link">API 配置</a>
      <div class="status-pill" id="statusPill">已停止</div>
    </nav>
  </header>

  <main class="main">
    <section class="panel control">
      <h2>控制</h2>
      <div class="ctrl-row">
        <button type="button" class="btn btn-start" id="btnStart">启动</button>
        <button type="button" class="btn btn-stop" id="btnStop">暂停</button>
      </div>
      <p class="hint" id="retryHint"></p>
    </section>

    <section class="panel params">
      <h2>参数</h2>
      <form class="params-form" id="paramsForm">
        <div class="row">
          <label>交易对</label>
          <input type="text" name="symbol" value="BTC/USDT" placeholder="BTC/USDT">
        </div>
        <div class="row">
          <label>触发比例 %</label>
          <input type="number" name="ratio" value="0.5" step="0.1" min="0.1">
        </div>
        <div class="row">
          <label>轮询间隔(秒)</label>
          <input type="number" name="interval" value="60" min="1">
        </div>
        <div class="row">
          <label>冷静期(秒)</label>
          <input type="number" name="cooldown_sec" value="60" min="1">
        </div>
        <div class="row">
          <label>每次买入 USDT</label>
          <input type="number" name="buy_amount_usdt" value="50" min="1" step="1">
        </div>
        <div class="row">
          <label>最小下单 USDT</label>
          <input type="number" name="min_buy_usdt" value="10" min="1">
        </div>
      </form>
    </section>

    <section class="panel log-panel">
      <h2>日志</h2>
      <pre class="log" id="log"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
